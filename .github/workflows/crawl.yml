name: 定时抓取彩票开奖数据

on:
  schedule:
    # 每天 UTC 16:00 运行（北京时间 凌晨0:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml chardet

      - name: 运行 crawl.py 脚本
        run: python py/crawl.py

      - name: 提交并推送生成的数据
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # 确保 data/ 目录存在，避免 git add 报错
          mkdir -p data
          # -f 强制添加被 .gitignore 忽略的文件
          git add -f data/
          git diff --staged --quiet || git commit -m "Auto update lottery data $(date -u +'%Y-%m-%d %H:%M')"
          git push