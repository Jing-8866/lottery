name: 定时抓取彩票开奖数据

on:
  schedule:
    # 每天 UTC 16:00 运行（北京时间 凌晨0:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 main 分支（含爬虫代码）
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml chardet

      - name: 运行爬虫
        run: python py/crawl.py

      - name: 仅推送 data/ 目录到 data-auto 分支
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 1. 备份生成的 JSON 数据到临时目录
          cp -r data /tmp/lottery-data

          # 2. 切换到 data-auto 分支（或新建孤立分支）
          git fetch origin data-auto 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/data-auto; then
            git checkout -B data-auto origin/data-auto
          else
            git checkout --orphan data-auto
          fi

          # 3. 清空工作目录（保留 .git），只保留 data/
          rm -rf ./* 2>/dev/null || true
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} + 2>/dev/null || true
          mkdir -p data
          cp /tmp/lottery-data/*.json data/

          # 4. 提交并推送（仅 data/*.json）
          git add -f data/
          git diff --staged --quiet || git commit -m "Auto update lottery data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force origin data-auto