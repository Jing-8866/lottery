name: 定时抓取彩票开奖数据

on:
  schedule:
    # 每天 UTC 16:00 运行（北京时间 凌晨0:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码（含完整历史）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml chardet

      - name: 运行 crawl.py 脚本（官方 API）
        run: python py/crawl.py

      - name: 提交并推送生成的数据到 data-auto 分支
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 先获取远程 data-auto 分支（可能已有之前的提交）
          git fetch origin data-auto 2>/dev/null || true

          # 切换到 data-auto 分支（本地已有则切换，没有则基于远程创建，都没有则新建 orphan）
          if git show-ref --verify --quiet refs/remotes/origin/data-auto; then
            git checkout -B data-auto origin/data-auto
          elif git show-ref --verify --quiet refs/heads/data-auto; then
            git checkout data-auto
          else
            git checkout --orphan data-auto
            git rm -rf . 2>/dev/null || true
          fi

          # 确保 data/ 目录存在
          mkdir -p data

          # -f 强制添加被 .gitignore 忽略的文件
          git add -f data/
          git diff --staged --quiet || git commit -m "Auto update lottery data $(date -u +'%Y-%m-%d %H:%M')"

          # 强制推送到 data-auto 分支（数据分支，无冲突风险）
          git push --force origin data-auto