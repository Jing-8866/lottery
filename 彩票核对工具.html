<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩票核对工具</title>
    <link rel="stylesheet" href="css/verify.css">
</head>
<body>
    <div class="back-link">
        <a href="index.html">🏠 返回首页</a>
    </div>

    <h1>✅ 彩票中奖核对</h1>

    <!-- 数据源快速链接 -->
    <div class="source-links">
        <span>📡 获取开奖号码：</span>
        <a href="https://www.cwl.gov.cn/" target="_blank" rel="noopener">🏮 福彩官网 cwl.gov.cn</a>
        <a href="https://www.lottery.gov.cn/" target="_blank" rel="noopener">⚽ 体彩官网 lottery.gov.cn</a>
        <a href="https://datachart.500.com/" target="_blank" rel="noopener">📊 500.com 开奖记录</a>
    </div>

    <div class="select-container">
        <label>彩票分类：</label>
        <select id="verify-category" onchange="verifyUpdateLottery()">
            <option value="">--请选择分类--</option>
            <option value="fc">🏮 福利彩票</option>
            <option value="tc">⚽ 体育彩票</option>
        </select>

        <label>彩票类型：</label>
        <select id="verify-lottery" onchange="verifySwitchLottery()">
            <option value="">--请先选择分类--</option>
        </select>
    </div>

    <div class="main-container">

        <!-- ========== 双色球 ========== -->
        <div class="lottery-panel active" id="verify-panel-ssq">
            <div class="card">
                <div class="card-title">📋 双色球</div>
                <div class="lottery-info">红球33选6 + 蓝球16选1，支持复式投注</div>

                <div class="two-col">
                    <div class="col">
                        <div class="form-row">
                            <label>我的号码 - 红球 <span class="hint">（至少6个，用逗号/空格分隔）</span></label>
                            <input type="text" id="verify-ssq-red" placeholder="例: 3,8,15,22,26,31" value="3,8,15,22,26,31">
                        </div>
                        <div class="form-row">
                            <label>我的号码 - 蓝球 <span class="hint">（至少1个）</span></label>
                            <input type="text" id="verify-ssq-blue" placeholder="例: 7" value="7">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-row">
                            <label>开奖号码 - 红球 <span class="hint">（6个）</span></label>
                            <input type="text" id="verify-ssq-win-red" placeholder="例: 5,11,18,23,27,32" value="5,11,18,23,27,32">
                        </div>
                        <div class="form-row">
                            <label>开奖号码 - 蓝球 <span class="hint">（1个）</span></label>
                            <input type="text" id="verify-ssq-win-blue" placeholder="例: 7" value="7">
                        </div>
                    </div>
                </div>

                <div class="fetch-row">
                    <div class="fetch-left">
                        <input type="text" id="verify-issue-ssq" class="issue-input" placeholder="期号(留空=最新)" maxlength="7">
                        <span class="draw-info" id="verify-draw-info-ssq"></span>
                    </div>
                    <button class="fetch-btn" onclick="fetchDrawAndFill(this)">📡 获取开奖</button>
                </div>

                <button class="btn-check" onclick="verifyCheck()">🔍 核对中奖</button>
            </div>
        </div>

        <!-- ========== 大乐透 ========== -->
        <div class="lottery-panel" id="verify-panel-dlt">
            <div class="card">
                <div class="card-title">📋 大乐透</div>
                <div class="lottery-info">前区35选5 + 后区12选2，支持复式投注</div>

                <div class="two-col">
                    <div class="col">
                        <div class="form-row">
                            <label>我的号码 - 前区 <span class="hint">（至少5个）</span></label>
                            <input type="text" id="verify-dlt-front" placeholder="例: 2,9,15,24,33" value="2,9,15,24,33">
                        </div>
                        <div class="form-row">
                            <label>我的号码 - 后区 <span class="hint">（至少2个）</span></label>
                            <input type="text" id="verify-dlt-back" placeholder="例: 3,8" value="3,8">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-row">
                            <label>开奖号码 - 前区 <span class="hint">（5个）</span></label>
                            <input type="text" id="verify-dlt-win-front" placeholder="例: 4,12,17,26,35" value="4,12,17,26,35">
                        </div>
                        <div class="form-row">
                            <label>开奖号码 - 后区 <span class="hint">（2个）</span></label>
                            <input type="text" id="verify-dlt-win-back" placeholder="例: 5,11" value="5,11">
                        </div>
                    </div>
                </div>

                <div class="fetch-row">
                    <div class="fetch-left">
                        <input type="text" id="verify-issue-dlt" class="issue-input" placeholder="期号(留空=最新)" maxlength="7">
                        <span class="draw-info" id="verify-draw-info-dlt"></span>
                    </div>
                    <button class="fetch-btn" onclick="fetchDrawAndFill(this)">📡 获取开奖</button>
                </div>

                <button class="btn-check" onclick="verifyCheck()">🔍 核对中奖</button>
            </div>
        </div>

        <!-- ========== 七乐彩 ========== -->
        <div class="lottery-panel" id="verify-panel-qlc">
            <div class="card">
                <div class="card-title">📋 七乐彩</div>
                <div class="lottery-info">从01-30中选7个基本号 + 1个特别号，支持复式投注</div>

                <div class="two-col">
                    <div class="col">
                        <div class="form-row">
                            <label>我的号码 - 基本号 <span class="hint">（至少7个）</span></label>
                            <input type="text" id="verify-qlc-basic" placeholder="例: 2,5,8,12,18,23,27" value="2,5,8,12,18,23,27">
                        </div>
                        <div class="form-row">
                            <label>我的号码 - 特别号 <span class="hint">（至少1个）</span></label>
                            <input type="text" id="verify-qlc-special" placeholder="例: 6" value="6">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-row">
                            <label>开奖号码 - 基本号 <span class="hint">（7个）</span></label>
                            <input type="text" id="verify-qlc-win-basic" placeholder="例: 1,5,8,14,19,23,28" value="1,5,8,14,19,23,28">
                        </div>
                        <div class="form-row">
                            <label>开奖号码 - 特别号 <span class="hint">（1个）</span></label>
                            <input type="text" id="verify-qlc-win-special" placeholder="例: 6" value="6">
                        </div>
                    </div>
                </div>

                <div class="fetch-row">
                    <div class="fetch-left">
                        <input type="text" id="verify-issue-qlc" class="issue-input" placeholder="期号(留空=最新)" maxlength="7">
                        <span class="draw-info" id="verify-draw-info-qlc"></span>
                    </div>
                    <button class="fetch-btn" onclick="fetchDrawAndFill(this)">📡 获取开奖</button>
                </div>

                <button class="btn-check" onclick="verifyCheck()">🔍 核对中奖</button>
            </div>
        </div>

        <!-- ========== 快乐8 ========== -->
        <div class="lottery-panel" id="verify-panel-kl8">
            <div class="card">
                <div class="card-title">📋 快乐8</div>
                <div class="lottery-info">从1-80中任选号码，每期开20个号码</div>

                <div class="form-row">
                    <label>玩法</label>
                    <select id="verify-kl8-type" onchange="verifyKL8PlayChange()" style="width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:15px;">
                        <option value="1">选一</option>
                        <option value="2">选二</option>
                        <option value="3">选三</option>
                        <option value="4" selected>选四</option>
                        <option value="5">选五</option>
                        <option value="6">选六</option>
                        <option value="7">选七</option>
                        <option value="8">选八</option>
                        <option value="9">选九</option>
                        <option value="10">选十</option>
                    </select>
                    <div style="font-size:12px;color:#888;margin-top:4px;" id="verify-kl8-hint">选4玩法：从1-80中选4个号码，每注2元</div>
                </div>

                <div class="two-col">
                    <div class="col">
                        <div class="form-row">
                            <label>我的号码 <span class="hint">（至少与玩法数量一致）</span></label>
                            <input type="text" id="verify-kl8-my" placeholder="例: 3,15,28,42" value="3,15,28,42">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-row">
                            <label>开奖号码 <span class="hint">（20个）</span></label>
                            <input type="text" id="verify-kl8-win" placeholder="例: 3,8,15,22,28,35,42,47,51,56,60,63,67,70,72,74,76,78,79,80"
                                value="3,8,15,22,28,35,42,47,51,56,60,63,67,70,72,74,76,78,79,80">
                        </div>
                    </div>
                </div>

                <div class="fetch-row">
                    <div class="fetch-left">
                        <input type="text" id="verify-issue-kl8" class="issue-input" placeholder="期号(留空=最新)" maxlength="7">
                        <span class="draw-info" id="verify-draw-info-kl8"></span>
                    </div>
                    <button class="fetch-btn" onclick="fetchDrawAndFill(this)">📡 获取开奖</button>
                </div>

                <button class="btn-check" onclick="verifyCheck()">🔍 核对中奖</button>
            </div>
        </div>

        <!-- ========== 七星彩 ========== -->
        <div class="lottery-panel" id="verify-panel-qxc">
            <div class="card">
                <div class="card-title">📋 七星彩</div>
                <div class="lottery-info">7位数字定位匹配，每位0-9</div>

                <div class="two-col">
                    <div class="col">
                        <div class="form-row">
                            <label>我的号码 <span class="hint">（7位数字）</span></label>
                            <input type="text" id="verify-qxc-my" placeholder="例: 3,8,1,5,6,2,9 或 3815629" value="3,8,1,5,6,2,9">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-row">
                            <label>开奖号码 <span class="hint">（7位数字）</span></label>
                            <input type="text" id="verify-qxc-win" placeholder="例: 3,8,2,5,6,1,9 或 3825619" value="3,8,2,5,6,1,9">
                        </div>
                    </div>
                </div>

                <div class="fetch-row">
                    <div class="fetch-left">
                        <input type="text" id="verify-issue-qxc" class="issue-input" placeholder="期号(留空=最新)" maxlength="7">
                        <span class="draw-info" id="verify-draw-info-qxc"></span>
                    </div>
                    <button class="fetch-btn" onclick="fetchDrawAndFill(this)">📡 获取开奖</button>
                </div>

                <button class="btn-check" onclick="verifyCheck()">🔍 核对中奖</button>
            </div>
        </div>

        <!-- ========== 结果区域 ========== -->
        <div id="verify-result-section" class="card result-section">
            <div class="card-title">🏆 核对结果</div>
            <div id="verify-result-content"></div>
        </div>

    </div>

    <script src="js/shared.js"></script>
    <script src="js/verify.js"></script>
</body>
</html>
